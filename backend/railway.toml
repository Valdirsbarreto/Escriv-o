[deploy]
startCommand = "sh -c 'PYTHONPATH=/app alembic upgrade head && celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 & exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
