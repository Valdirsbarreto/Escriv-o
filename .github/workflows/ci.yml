name: CI — Escrivão AI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: Lint e Testes ──────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes (pytest)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_ECONOMICO_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_STANDARD_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PREMIUM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_ECONOMICO_MODEL: deepseek/deepseek-chat
          LLM_STANDARD_MODEL: gemini-flash-latest
          LLM_PREMIUM_MODEL: gemini-pro-latest
          REDIS_URL: redis://localhost:6379/0
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY: escrivao
          S3_SECRET_KEY: escrivao_minio_2024
          S3_BUCKET_NAME: escrivao-documentos
          APP_SECRET_KEY: chave-ci-apenas-nao-producao
          APP_ENV: testing
        run: python -m pytest tests/ -v --tb=short

  # ─── Frontend: Build Next.js ─────────────────────────────────────
  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: Build de produção
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000/api/v1' }}
        run: npm run build
